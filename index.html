  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }

    #splash {
      position: fixed; inset: 0; background: #f8fafc;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 10; transition: opacity .4s;
    }
    #splash img { width: 90px; border-radius: 12px; }
    #splash h1 { font-family: 'Segoe UI', sans-serif; color: #2563eb; font-size: 1.5rem; }
    #splash p  { font-family: 'Segoe UI', sans-serif; color: #64748b; font-size: .9rem; }
    .ring { width: 40px; height: 40px; border: 4px solid #e2e8f0;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app-frame {
      width: 100%; height: 100%; border: none;
      opacity: 0; transition: opacity .4s;
    }
  </style>
